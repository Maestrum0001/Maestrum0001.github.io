<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sensor Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        #email-signup {
            margin: 30px auto;
            max-width: 400px;
            text-align: center;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: #f9f9f9;
        }
        #email-signup h3 {
            margin-bottom: 12px;
        }
        #email-signup input[type="email"] {
            width: 70%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        #email-signup button {
            padding: 8px 16px;
            margin-left: 8px;
            background-color: #4e73df;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        #email-signup button:hover {
            background-color: #375abd;
        }
        #email-signup #status {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <h1>Firewatch Dashboard</h1>
        <select id="deviceSelector"></select>
    </div>

    <!-- Dashboard Layout -->
    <div class="unit">
        <div class="sensor-grid">

            <!--Internal Temp-->
            <div class="gauge" id="internalTempGauge">
                <span class="label">Internal Temp</span>
                <div class="circle">
                    <span class="value" id="internalTempValue">--°C</span>
                </div>
            </div>

            <!--External Temp-->
            <div class="gauge" id="externalTempGauge">
                <span class="label">External Temp</span>
                <div class="circle">
                    <span class="value" id="externalTempValue">--°C</span>
                </div>
            </div>

            <!--Internal Humidity-->
            <div class="humidity" id="internalHumidityBox">
                <span class="label">Internal Humidity</span>
                <div class="vertical-bar">
                    <div class="vertical-fill" id="internalHumidityFill"></div>
                </div>
                <span class="humidity-value" id="internalHumidityValue">--%</span>
            </div>

            <!--External Humidity-->
            <div class="humidity" id="externalHumidityBox">
                <span class="label">External Humidity</span>
                <div class="vertical-bar">
                    <div class="vertical-fill" id="externalHumidityFill"></div>
                </div>
                <span class="humidity-value" id="externalHumidityValue">--%</span>
            </div>

            <!--Mems suite-->
            <div class="sensor" id="smoke">Smoke: --</div>
            <div class="sensor" id="voc">VOC: --</div>
            <div class="sensor" id="methane">Methane: --</div>
            <div class="sensor" id="co">CO: --</div>

        </div>
    </div>

</div>

<div id="unit-photo-container">
    <img id="unitPhoto" src="" alt="Camera Image" />
</div>

<!-- Email Alert Signup -->
<div id="email-signup">
    <h3>Get FireWatch Alerts via Email</h3>
    <input type="email" id="email" placeholder="you@example.com" />
    <button onclick="subscribe()">Subscribe</button>
    <p id="status"></p>
</div>

<script>
// ─── Dashboard ───────────────────────────────────────────────────────────────

const devices = {
    "Unit 1": "1C:DB:D4:47:6B:FC",
    "Unit 2": "90:70:69:35:F4:58",
    "Unit 3": "11:22:33:44:55:66"
};

const selector = document.getElementById("deviceSelector");

Object.keys(devices).forEach(name => {
    const option = document.createElement("option");
    option.value = devices[name];
    option.textContent = name;
    selector.appendChild(option);
});

function loadDeviceData(deviceId) {
    const apiUrl = `https://vu0v9n00ng.execute-api.us-east-1.amazonaws.com/sensors/${deviceId}`;
    
    fetch(apiUrl)
        .then(res => {
            console.log("STATUS:", res.status);
            return res.json();
        })
        .then(data => {
            console.log("DATA:", data);

            if (data.internalTemp === undefined) {
                console.error("Bad response from API:", data);
                return;
            }

            // Temperature values
            updateGauge("internalTempGauge", data.internalTemp);
            updateGauge("externalTempGauge", data.externalTemp);

            document.getElementById("internalTempValue").textContent = data.internalTemp.toFixed(2) + "°C";
            document.getElementById("externalTempValue").textContent = data.externalTemp.toFixed(2) + "°C";

            // Humidity values
            document.getElementById("internalHumidityFill").style.height = data.internalHumidity.toFixed(2) + "%";
            document.getElementById("externalHumidityFill").style.height = data.externalHumidity.toFixed(2) + "%";

            document.getElementById("internalHumidityValue").textContent = data.internalHumidity.toFixed(2) + "%";
            document.getElementById("externalHumidityValue").textContent = data.externalHumidity.toFixed(2) + "%";

            // Mems suite values
            document.getElementById("smoke").textContent = `Smoke: ${data.smoke.toFixed(2)}`;
            document.getElementById("voc").textContent = `VOC: ${data.smoke.toFixed(2)}`;
            document.getElementById("methane").textContent = `Methane: ${data.methane.toFixed(2)}`;
            document.getElementById("co").textContent = `CO: ${data.co.toFixed(2)}`;

            // Camera photo
            const img = document.getElementById("unitPhoto");
            const imageUrl = data.S3_Address;
            if (imageUrl) {
                img.style.display = "block";
                img.src = imageUrl;
            } else {
                img.src = "";
            }
            console.log("FULL DATA:", data);
        })
        .catch(err => {
            console.error("FETCH ERROR:", err);
        });
}

// Dropdown change handler
selector.addEventListener("change", () => {
    loadDeviceData(selector.value);
});

// Init load
loadDeviceData(selector.value);

// Auto-refresh every 5 seconds
setInterval(() => {
    loadDeviceData(selector.value);
}, 5000);

function updateGauge(id, temp) {
    const circle = document.querySelector(`#${id} .circle`);
    const min = 0;
    const max = 54.4;
    let percentage = ((temp - min) / (max - min)) * 100;

    let color;
    if (temp > max) {
        color = "red";
        percentage = 100;
    } else if (temp > 37.7) {
        color = "orange";
    } else if (temp < min) {
        color = "blue";
        percentage = 0;
    } else {
        color = "#4e73df";
    }

    circle.style.background =
        `conic-gradient(${color} ${percentage}%, #e6e6e6 ${percentage}%)`;
}

// ─── Email Signup ─────────────────────────────────────────────────────────────

async function subscribe() {
    const email = document.getElementById('email').value;
    const status = document.getElementById('status');

    if (!email) {
        status.textContent = '❌ Please enter an email address.';
        return;
    }

    status.textContent = 'Subscribing...';

    try {
        const res = await fetch('https://vu0v9n00ng.execute-api.us-east-1.amazonaws.com/sensors/emailAlerts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        status.textContent = res.ok
            ? '✅ Check your inbox to confirm your subscription!'
            : '❌ Error: ' + data.message;
    } catch (err) {
        status.textContent = '❌ Network error. Please try again.';
    }
}
</script>

</body>
</html>
